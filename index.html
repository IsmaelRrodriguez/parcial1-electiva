<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer Parcial</title>
    <style>
       
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border-top: 5px solid #24292e; 
        }

       
        h1 {
            color: #24292e;
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        
        p {
            color: #586069;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

       
        hr {
            border: 0;
            height: 1px;
            background: #e1e4e8;
            margin-bottom: 25px;
        }

        
        .footer {
            font-size: 0.95rem;
            color: #24292e;
            background-color: #f6f8fa;
            padding: 12px;
            border-radius: 6px;
            display: inline-block;
        }

        .footer strong {
            color: #0366d6; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Integración Continua</h1>
        <p>Proyecto desplegado automáticamente con <strong>GitHub Actions</strong> y <strong>Surge.sh</strong></p>
        
        <hr>

        <div class="footer">
            <strong>Estudiante:</strong> Ismael Rodriguez
        </div>
    </div>

</body>
</html>
